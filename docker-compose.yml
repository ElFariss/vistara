services:
  postgres:
    image: postgres:16-alpine
    container_name: umkm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-umkm}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-change-me}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-umkm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  python-agent:
    build: ./tools/python-agent
    container_name: umkm-python-agent
    restart: unless-stopped
    environment:
      PY_AGENT_HOST: 0.0.0.0
      PY_AGENT_PORT: 8091
      PY_AGENT_TOKEN: ${PYTHON_AGENT_TOKEN:-replace-python-token}
      PY_AGENT_TIMEOUT_SEC: 2.5
    expose:
      - "8091"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8091/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    build: .
    container_name: umkm-intelligence
    depends_on:
      - postgres
      - python-agent
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DATA_DIR: /app/data
      DATABASE_URL: ${DATABASE_URL:-postgresql://${PGUSER:-postgres}:${PGPASSWORD:-change-me}@postgres:5432/${PGDATABASE:-umkm}}
      JWT_SECRET: ${JWT_SECRET:-replace-me}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API: ${GEMINI_API:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-pro}
      API_BASE_URL: ${API_BASE_URL:-}
      PYTHON_AGENT_URL: http://python-agent:8091
      PYTHON_AGENT_TOKEN: ${PYTHON_AGENT_TOKEN:-replace-python-token}
      PYTHON_AGENT_TIMEOUT_MS: 3500
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
