services:
  postgres:
    image: postgres:16-alpine
    container_name: umkm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-umkm}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-umkm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent-backend:
    image: ${AGENT_IMAGE:-vistara-agent-backend:latest}
    container_name: umkm-agent-backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API: ${GEMINI_API:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-pro}
      GEMINI_MODEL_LIGHT: ${GEMINI_MODEL_LIGHT:-gemini-2.5-flash}
      DATABASE_URL: postgresql://${PGUSER:-postgres}:${PGPASSWORD:-change-me}@postgres:5432/${PGDATABASE:-umkm}
      HOST: 0.0.0.0
      PORT: 8001
      DEBUG: "false"
      NODEJS_INTERNAL_URL: http://app:8080
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    image: ${APP_IMAGE:-vistara-app:latest}
    container_name: umkm-intelligence
    depends_on:
      postgres:
        condition: service_healthy
      agent-backend:
        condition: service_healthy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8081}:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      NODE_OPTIONS: --max-old-space-size=192
      DATA_DIR: /app/data
      DATABASE_URL: postgresql://${PGUSER:-postgres}:${PGPASSWORD:-change-me}@postgres:5432/${PGDATABASE:-umkm}
      SERVE_PUBLIC_ASSETS: ${SERVE_PUBLIC_ASSETS:-false}
      JWT_SECRET: ${JWT_SECRET:-replace-me}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API: ${GEMINI_API:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-pro}
      GEMINI_MODEL_LIGHT: ${GEMINI_MODEL_LIGHT:-gemini-2.5-flash}
      API_BASE_URL: ${API_BASE_URL:-}
      PYTHON_AGENT_BACKEND_URL: http://agent-backend:8001
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
